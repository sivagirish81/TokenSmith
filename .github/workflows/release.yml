name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify-tag-on-main:
    name: Verify tag commit is on main
    runs-on: ubuntu-latest
    if: github.event.repository.private == false
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tagged commit is reachable from main
        run: |
          git fetch origin main
          git branch -r --contains "${GITHUB_SHA}" | grep -q "origin/main"

  build:
    name: Build ${{ matrix.target }}
    needs: verify-tag-on-main
    if: github.event.repository.private == false
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin_ext: ""
            asset_name: tokensmith-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin_ext: .exe
            asset_name: tokensmith-windows-x86_64.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            bin_ext: ""
            asset_name: tokensmith-macos-aarch64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package artifact (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/tokensmith${{ matrix.bin_ext }} ${{ matrix.asset_name }}

      - name: Package artifact (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "target/${{ matrix.target }}/release/tokensmith${{ matrix.bin_ext }}" "${{ matrix.asset_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event.repository.private == false

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten dist
        run: |
          find dist -type f -maxdepth 3 -exec mv {} dist/ \;

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
